                <p>(३) शैक्षिक वा गैर-नाफामुखी उद्देश्यका लागि सामग्री प्रयोग गर्न अनुमति माग्न कम्पनीलाई सम्पर्क गर्न सकिन्छ।</p>
                
                <h2>५. सदस्यता आवेदन र जानकारीः</h2>
                <p>वेबसाइटले कम्पनीको संस्थापक सदस्य, साधारण सदस्य, आजीवन सदस्य वा मानार्थ सदस्य बारे जानकारी उपलब्ध गराउन सक्छ। वेबसाइट मार्फत पेश गरिएको कुनै पनि आवेदन वा चासोको अभिव्यक्तिले आफैँमा सदस्यता प्रदान गर्दैन। सदस्यता कम्पनीको प्रबन्धपत्र र नियमावलीमा उल्लिखित योग्यता अनुसार प्रमाणीकरणको अधीनमा रहनेछ, र अन्तिम स्वीकृति संस्थापक समूह वा दर्तापश्चात् सञ्चालक समितिले दिनेछ। सदस्यताका लागि आवेदन गर्दा तपाईंले सही, वर्तमान र पूर्ण जानकारी उपलब्ध गराउनुहुनेछ भनी सहमत हुनुहुन्छ। गलत जानकारीको कारणले हुने कुनै ढिलाइ वा अस्वीकारको लागि कम्पनी उत्तरदायी हुनेछैन।</p>
                
                <h2>६. अस्वीकारोक्ति र दायित्वको सीमाः</h2>
                <p>(१) वेबसाइट र यसको सम्पूर्ण सामग्री "जस्तो छ" र "जस्तो उपलब्ध छ" को आधारमा प्रदान गरिन्छ। कम्पनीले वेबसाइट निर्बाध, त्रुटिरहित, सुरक्षित वा भाइरस तथा अन्य हानिकारक कम्पोनेन्टबाट मुक्त हुने कुनै प्रकारको जमानत दिँदैन।</p>
                <p>(२) नेपालको कानूनले अनुमति दिएको अधिकतम सीमासम्म, कम्पनी (यसका संस्थापक, संभावित सदस्य र प्रतिनिधिहरू सहित) वेबसाइटको प्रयोग वा प्रयोग गर्न नसक्नुबाट उत्पन्न वा सम्बन्धित कुनै प्रत्यक्ष, अप्रत्यक्ष, आकस्मिक, विशेष, परिणामात्मक वा दण्डात्मक क्षतिको लागि उत्तरदायी हुनेछैन, चाहे त्यस्तो क्षतिको सम्भावनाबारे सल्लाह दिइएको भए तापनि।</p>
                <p>(३) कम्पनी हाल दर्ता नभएको हुँदा, कुनै पनि व्यक्तिगत संस्थापक वा प्रतिनिधि वेबसाइटको सामग्री वा सञ्चालनको लागि व्यक्तिगत दायित्वमा रहनेछैन। कुनै पनि दायित्व, यदि उत्पन्न भएमा, दर्तापश्चात् कम्पनी ऐन, २०६३ अनुसार शासित हुनेछ।</p>
                
                <h2>७. तेस्रो पक्षको लिङ्कः</h2>
                <p>वेबसाइटमा बाह्य वेबसाइट वा स्रोतहरूको लिङ्क हुन सक्छ जुन कम्पनीको स्वामित्व वा नियन्त्रणमा छैनन्। हामी यी लिङ्कहरू केवल तपाईंको सुविधाको लागि उपलब्ध गराउँछौँ, र कुनै पनि तेस्रो पक्षको वेबसाइटको सामग्री, गोपनीयता नीति वा अभ्यासहरूको समर्थन वा जिम्मेवारी लिँदैनौँ। तपाईं आफ्नै जोखिममा त्यस्ता लिङ्कहरूमा पहुँच गर्नुहुन्छ।</p>
                
                <h2>८. गोपनीयता र डाटा संरक्षणः</h2>
                <p>तपाईंले वेबसाइट मार्फत उपलब्ध गराउनुभएको कुनै पनि व्यक्तिगत जानकारी (जस्तै नाम, इमेल ठेगाना, सदस्यता आवेदन विवरण) हाम्रो गोपनीयता नीति अनुसार व्यवस्थित गरिनेछ, जुन यी प्रयोगका सर्तहरूमा सन्दर्भद्वारा समावेश गरिएको छ। वेबसाइट प्रयोग गरेर, तपाईंले गोपनीयता नीतिमा वर्णित अनुसार आफ्नो जानकारीको सङ्कलन र प्रशोधनमा सहमति जनाउनुभएको मानिनेछ।</p>
                
                <h2>९. शासक कानून र विवाद समाधानः</h2>
                <p>यी प्रयोगका सर्तहरू नेपालको कानून द्वारा शासित र व्याख्या गरिनेछ, कानूनको द्वन्द्व प्रावधानहरूलाई बेवास्ता गर्दै। यी सर्तहरू वा वेबसाइटको प्रयोग सम्बन्धी उत्पन्न हुने कुनै पनि विवाद नेपालको काठमाण्डौं जिल्ला अदालतको अनन्य अधिकार क्षेत्रको अधीनमा रहनेछ (वा दर्तापश्चात् कम्पनीको दर्ता कार्यालय रहेको जिल्लाको अदालतको)। तथापि, प्रारम्भ मिति सम्म, कम्पनी दर्ता भएको छैन; कुनै पनि विवाद संस्थापक सदस्यहरू बीच सौहार्दपूर्ण रूपमा समाधान गरिनेछ वा कुनै कानूनी कारबाही अगाडि मध्यस्थतामा पेश गरिनेछ।</p>
                
                <h2>१०. परिमार्जन र समाप्तिः</h2>
                <p>कम्पनीले कुनै पनि समयमा बिना सूचना वेबसाइटको कुनै भाग परिमार्जन, निलम्बन वा बन्द गर्ने अधिकार सुरक्षित राख्दछ। यी प्रयोगका सर्तहरूको कुनै उल्लङ्घनको लागि हामी तपाईंको वेबसाइट पहुँच समाप्त वा प्रतिबन्धित गर्न सक्छौँ। ती प्रावधानहरू जुन प्रकृतिले समाप्तिपश्चात् पनि कायम रहनुपर्छ (जस्तै बौद्धिक सम्पत्ति, अस्वीकारोक्ति, र दायित्वको सीमा) प्रभावकारी रहनेछन्।</p>
                
                <h2>११. विविधः</h2>
                <p>(१) यदि यी प्रयोगका सर्तहरूको कुनै प्रावधान अमान्य वा लागू नहुने ठहरियो भने, बाँकी प्रावधानहरू पूर्ण रूपमा प्रभावकारी रहनेछन्।</p>
                <p>(२) हामीले कुनै अधिकार वा प्रावधान लागू गर्न असफल हुनुलाई त्यस्तो अधिकार वा प्रावधानको त्याग मानिने छैन।</p>
                <p>(३) यी प्रयोगका सर्तहरूले तपाईं र कम्पनी बीच वेबसाइटको प्रयोगको सम्बन्धमा सम्पूर्ण सम्झौता गठन गर्दछ, जसले कुनै पनि पूर्व सम्झौतालाई प्रतिस्थापन गर्दछ।</p>
                <p>(४) यी सर्तहरू अन्तर्गत कुनै प्रश्न वा सूचनाको लागि कम्पनीलाई सम्पर्क गर्न सकिन्छ।</p>
                <p>(५) यस वेबसाइटको प्रयोग गरेर, तपाईंले यी प्रयोगका सर्तहरू पढी, बुझी र स्वीकार गरेको स्वीकारोक्ति दिनुहुन्छ।</p>
                <p><em>इति सम्वत् २०८३ साल वैशाख महिना ४ गते रोज ६ शुभम् .............................................. ।</em></p>
            `,
            footerText: "© २०२५ नेपाल ल ग्रुप – सबै अधिकार सुरक्षित",
            termsText: "प्रयोगका सर्तहरू", privacyText: "गोपनीयता नीति", cookieText: "कुकी नीति"
        }
    };

    let currentLang = localStorage.getItem("nlgLang") || "en";

    function updateUI(lang) {
        const d = content[lang];
        document.getElementById("brandName").innerText = d.brand;
        document.getElementById("navHome").innerText = d.navHome;
        document.getElementById("navAbout").innerText = d.navAbout;
        document.getElementById("navMembership").innerText = d.navMembership;
        document.getElementById("navContact").innerText = d.navContact;
        document.getElementById("pageTitle").innerText = d.pageTitle;
        document.getElementById("termsContent").innerHTML = d.htmlContent;
        document.getElementById("footerText").innerText = d.footerText;
        document.getElementById("termsLink").innerText = d.termsText;
        document.getElementById("privacyLink").innerText = d.privacyText;
        document.getElementById("cookieLink").innerText = d.cookieText;

        document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
        if (lang === "np") document.getElementById("langNp").classList.add("active");
        else document.getElementById("langEn").classList.add("active");
        localStorage.setItem("nlgLang", lang);
    }

    document.getElementById("langNp").addEventListener("click", () => updateUI("np"));
    document.getElementById("langEn").addEventListener("click", () => updateUI("en"));
    updateUI(currentLang);
</script>
</body>
</html>
