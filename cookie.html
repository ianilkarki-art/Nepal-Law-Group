                <p>(ख) <strong>प्राथमिकता (कार्यात्मकता) कुकीहरू</strong> ले वेबसाइटलाई तपाईंले गर्नुभएका छनौटहरू (जस्तै तपाईंको भाषा प्राथमिकता वा क्षेत्र) सम्झन र परिष्कृत, व्यक्तिगत सुविधाहरू प्रदान गर्न अनुमति दिन्छ। वेबसाइटको पाठ आकार, फन्ट, वा अन्य अनुकूलन योग्य भागहरूमा तपाईंले गर्नुभएका परिवर्तनहरू सम्झन पनि तिनीहरू प्रयोग गर्न सकिन्छ। यी कुकीहरू असक्षम गर्नाले केही सेवाहरूलाई राम्रोसँग काम गर्नबाट रोक्न सक्छ।</p>
                <p>(ग) <strong>विश्लेषण (प्रदर्शन) कुकीहरू</strong> आगन्तुकहरूले वेबसाइट कसरी प्रयोग गर्छन् भन्ने बारे जानकारी सङ्कलन गर्न प्रयोग गरिन्छ - उदाहरणका लागि, कुन पृष्ठहरू प्रायः भ्रमण गरिन्छ, प्रयोगकर्ताहरूले पृष्ठहरू बीच कसरी नेभिगेट गर्छन्, र तिनीहरूले त्रुटि सन्देशहरू सामना गर्छन् कि गर्दैनन्। यसले हामीलाई वेबसाइटको प्रदर्शन र प्रयोगकर्ता अनुभव सुधार गर्न मद्दत गर्दछ। यी कुकीहरूद्वारा सङ्कलन गरिएका सबै जानकारीहरू एकत्रित र बेनामी छन्। हामीले प्रयोग गर्न सक्ने विश्लेषण सेवा (जस्तै गुगल एनालिटिक्स वा समान प्लेटफर्म) को आफ्नै गोपनीयता नीति हुनेछ।</p>
                <p>(घ) <strong>मार्केटिङ (लक्ष्यीकरण) कुकीहरू</strong> हाल जानाजानी सेट गरिएको छैन किनभने कम्पनीले वेबसाइटमा कुनै पनि विज्ञापन वा मार्केटिङ गतिविधिहरूमा संलग्न छैन। यदि भविष्यमा यो परिवर्तन भयो भने, हामी यो नीति अद्यावधिक गर्नेछौं र कानूनद्वारा आवश्यक पर्ने ठाउँमा तपाईंको स्पष्ट सहमति खोज्नेछौं।</p>
                
                <h2>४. यस वेबसाइटमा प्रयोग गरिएका कुकीहरू</h2>
                <p>(१) वेबसाइटले हाल सीमित कुकीहरू तैनाथ गर्दछ, जुन सबै माथि वर्णन गरिएका कोटीहरूमा पर्छन्। कडा रूपमा आवश्यक कुकीहरूमा सत्र पहिचानकर्ता (session_id) समावेश छ जसले तपाईंले वेबसाइट नेभिगेट गर्दा तपाईंको ब्राउजिङ सत्र कायम राख्छ, जसले सर्भरलाई निरन्तर अन्तरक्रियाको भागको रूपमा तपाईंको अनुरोधहरू पहिचान गर्न अनुमति दिन्छ। तपाईंले आफ्नो ब्राउजर बन्द गर्दा यो कुकी मेटाइन्छ। अर्को कडा रूपमा आवश्यक कुकी, csrf_token, कुनै पनि फारम पेश गर्ने वा राज्य परिवर्तन गर्ने अनुरोध वेबसाइटबाटै उत्पन्न भएको सुनिश्चित गरेर क्रस साइट अनुरोध जालसाजी आक्रमणहरू विरुद्ध सुरक्षा प्रदान गर्दछ। यो कुकी तपाईंको सत्रको अवधिको लागि मात्र रहन्छ।</p>
                <p>(२) हामी प्राथमिकता कुकी, lang_pref पनि प्रयोग गर्छौं, जसले तपाईंको छनौट गरिएको भाषा प्राथमिकता (नेपाली वा अंग्रेजी) सम्झन्छ ताकि तपाईंले प्रत्येक भ्रमणमा यसलाई पुन: चयन गर्नु पर्दैन। यो कुकी एक वर्षको लागि रहन्छ। थप रूपमा, cookie_consent नामको कडा रूपमा आवश्यक कुकीले तपाईंको पहिलो भ्रमणमा प्रस्तुत गरिएको कुकी सूचनाको तपाईंको स्वीकृति रेकर्ड गर्दछ। यो कुकी छ महिनाको लागि भण्डारण गरिन्छ र सूचनालाई बारम्बार देखा पर्नबाट रोक्छ।</p>
                <p>(३) विश्लेषण उद्देश्यका लागि, हामी _ga र _gid जस्ता कुकीहरू प्रयोग गर्न सक्छौं (यदि हामी गुगल एनालिटिक्स वा समान सेवा प्रयोग गर्छौं भने)। यी कुकीहरूले अद्वितीय प्रयोगकर्ताहरूलाई छुट्याउँछन् र वेबसाइटसँगको उनीहरूको अन्तरक्रिया ट्र्याक गर्छन्, जसले हामीलाई कुन पृष्ठहरू प्रायः भ्रमण गरिन्छ, प्रयोगकर्ताहरूले पृष्ठहरू बीच कसरी नेभिगेट गर्छन्, र कुनै प्राविधिक त्रुटिहरू हुन्छन् कि हुँदैनन् भनेर बुझ्न मद्दत गर्दछ। _ga कुकी सामान्यतया दुई वर्षसम्म रहन्छ, जबकि _gid २४ घण्टासम्म रहन्छ। विश्लेषण कुकीहरूद्वारा सङ्कलन गरिएको सबै डेटा एकत्रित र बेनामी हुन्छ; यसले तपाईंलाई व्यक्तिगत रूपमा पहिचान गर्दैन। हामी हाल कुनै पनि मार्केटिङ वा लक्षित कुकीहरू प्रयोग गर्दैनौं, किनकि वेबसाइटमा कुनै विज्ञापन छैन। यदि यो भविष्यमा परिवर्तन भयो भने, हामी यो कुकी नीति तदनुसार अद्यावधिक गर्नेछौं र कानूनद्वारा आवश्यक भएमा तपाईंको स्पष्ट सहमति खोज्नेछौं।</p>
                
                <h2>५. तेस्रो पक्ष कुकीहरू</h2>
                <p>(१) हामीले तेस्रो पक्ष सेवाहरू प्रयोग गर्न सक्छौं जसले तपाईंले वेबसाइट प्रयोग गर्दा तपाईंको उपकरणमा आफ्नै कुकीहरू सेट गर्दछ। यी तेस्रो पक्षहरूले समावेश गर्दछन्:</p>
                <ul>
                    <li>(क) वेबसाइटको भरपर्दो डेलिभरी सुनिश्चित गर्न वेब होस्टिंग प्रदायक</li>
                    <li>(ख) अज्ञात प्रयोग तथ्याङ्कहरू सङ्कलन गर्न विश्लेषण प्रदायक (जस्तै, गुगल एनालिटिक्स)</li>
                    <li>(ग) सञ्चार व्यवस्थापनको लागि इमेल सेवा प्रदायक (यदि तपाईंले हामीलाई सम्पर्क गर्नुभयो वा सदस्यता लिनुभयो भने)</li>
                </ul>
                <p>(२) हामी तेस्रो पक्ष कुकीहरूको सेटिङ नियन्त्रण गर्दैनौं। थप जानकारीको लागि तपाईंले यी तेस्रो पक्षहरूको कुकी र गोपनीयता नीतिहरूको समीक्षा गर्नुपर्छ। हाल, कम्पनीले तेस्रो पक्ष ट्र्याकिङ कुकीहरू सेट गर्ने सामाजिक सञ्जाल प्लगइनहरू एकीकृत गर्दैन।</p>
                
                <h2>६. तपाईंको सहमति र नियन्त्रण</h2>
                <p>(१) जब तपाईं पहिलो पटक वेबसाइटमा जानुहुन्छ, हामी तपाईंलाई कुकीहरूको हाम्रो प्रयोगको बारेमा जानकारी दिने प्रमुख कुकी सूचना प्रदर्शन गर्नेछौं। यो सूचना हेरेपछि वेबसाइट ब्राउज गर्न वा प्रयोग गर्न जारी राखेर, तपाईं यस नीतिमा वर्णन गरिए अनुसार कुकीहरूको हाम्रो प्रयोगमा सहमत हुनुहुन्छ, कडा रूपमा आवश्यक कुकीहरू बाहेक जसलाई कुनै सहमति आवश्यक पर्दैन।</p>
                <p>(२) तपाईं कुनै पनि समयमा आफ्नो सहमति फिर्ता लिन सक्नुहुन्छ:</p>
                <ul>
                    <li>(क) तपाईंको ब्राउजरबाट कुकीहरू खाली गर्दै;</li>
                    <li>(ख) तपाईंको ब्राउजर सेटिङहरूमा कुकीहरू असक्षम गर्दै;</li>
                    <li>(ग) तेस्रो पक्ष विश्लेषण सेवाहरू (जस्तै, गुगल एनालिटिक्स अप्ट आउट ब्राउजर एड अन) द्वारा प्रदान गरिएको अप्ट आउट संयन्त्रहरू प्रयोग गर्दै।</li>
                </ul>
                <p>(३) धेरैजसो वेब ब्राउजरहरूले तपाईंलाई तिनीहरूको सेटिङहरू मार्फत कुकीहरू नियन्त्रण गर्न अनुमति दिन्छन्। तपाईंले निम्न गर्न सक्नुहुन्छ:</p>
                <ul>
                    <li>(क) तपाईंको उपकरणमा कुन कुकीहरू भण्डारण गरिएका छन् हेर्नुहोस् र तिनीहरूलाई व्यक्तिगत रूपमा मेटाउनुहोस्;</li>
                    <li>(ख) तेस्रो पक्ष कुकीहरू रोक्नुहोस्;</li>
                    <li>(ग) सबै कुकीहरू रोक्नुहोस् (कडा रूपमा आवश्यक पर्नेहरू सहित);</li>
                    <li>(घ) कुकी सेट गर्नु अघि सूचना प्राप्त गर्नुहोस्।</li>
                </ul>
                <p>(४) निर्देशनहरूको लागि कृपया आफ्नो ब्राउजरको मद्दत खण्ड हेर्नुहोस्। सबै कुकीहरू रोक्दा वेबसाइटको कार्यक्षमता बिग्रन सक्छ भन्ने कुरामा सचेत रहनुहोस्।</p>
                
                <h2>७. यस कुकी नीतिमा परिवर्तनहरू</h2>
                <p>हामी प्रविधि, कानुनी आवश्यकताहरू, वा कुकीहरूको हाम्रो प्रयोगमा परिवर्तनहरू प्रतिबिम्बित गर्न समय-समयमा यो कुकी नीति अद्यावधिक गर्न सक्छौं। कुनै पनि सामग्री परिवर्तनहरू अद्यावधिक प्रभावकारी मितिको साथ यस पृष्ठमा पोस्ट गरिनेछ। हामी तपाईंलाई समय-समयमा यो नीति समीक्षा गर्न प्रोत्साहित गर्दछौं। कुनै पनि परिवर्तन पछि वेबसाइटको तपाईंको निरन्तर प्रयोगले संशोधित नीतिको तपाईंको स्वीकृतिलाई गठन गर्दछ।</p>
                
                <h2>८. सम्पर्क जानकारी</h2>
                <p>यदि तपाईंसँग यस कुकी नीति वा कुकीहरूको हाम्रो प्रयोगको बारेमा कुनै प्रश्न, चिन्ता, वा अनुरोधहरू छन् भने, कृपया कम्पनीलाई सम्पर्क गर्नुहोस्। कम्पनी अझै सम्म समावेश गरिएको छैन, सोधपुछ संस्थापक समूह द्वारा ह्यान्डल गरिनेछ। समावेश पछि, कम्पनीले एक तोकिएको डेटा सुरक्षा सम्पर्क व्यक्ति नियुक्त गर्नेछ।</p>
                
                <h2>९. शासकीय कानून</h2>
                <p>(१) यो कुकी नीति र यस अन्तर्गत उत्पन्न हुने कुनै पनि विवादहरू नेपालको कानूनद्वारा शासित हुनेछन्। यस नीतिसँग सम्बन्धित कुनै पनि कानुनी कारबाही हाम्रो प्रयोगका सर्तहरूमा तोकिएका सीमाहरूको अधीनमा, काठमाडौँ जिल्ला, नेपाल (वा, समावेश पछि, कम्पनीको दर्ता कार्यालय रहेको जिल्ला) को अदालतहरूमा ल्याइनेछ।</p>
                <p>(२) यो वेबसाइट प्रयोग गर्न जारी राखेर, तपाईंले यो कुकी नीति पढ्नुभएको, बुझ्नुभएको र सहमत भएको स्वीकार गर्नुहुन्छ।</p>
                <p><em>इति सम्वत् २०८३ साल वैशाख महिना ४ गते रोज ६ शुभम् .............................................. ।</em></p>
            `,
            footerText: "© २०२६ नेपाल ल ग्रुप – सबै अधिकार सुरक्षित",
            termsText: "प्रयोगका सर्तहरू", privacyText: "गोपनीयता नीति", cookieText: "कुकी नीति"
        }
    };

    let currentLang = localStorage.getItem("nlgLang") || "en";

    function updateUI(lang) {
        const d = content[lang];
        document.getElementById("brandName").innerText = d.brand;
        document.getElementById("navHome").innerText = d.navHome;
        document.getElementById("navAbout").innerText = d.navAbout;
        document.getElementById("navMembership").innerText = d.navMembership;
        document.getElementById("navContact").innerText = d.navContact;
        document.getElementById("pageTitle").innerText = d.pageTitle;
        document.getElementById("cookieContent").innerHTML = d.htmlContent;
        document.getElementById("footerText").innerText = d.footerText;
        document.getElementById("termsLink").innerText = d.termsText;
        document.getElementById("privacyLink").innerText = d.privacyText;
        document.getElementById("cookieLink").innerText = d.cookieText;

        document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
        if (lang === "np") document.getElementById("langNp").classList.add("active");
        else document.getElementById("langEn").classList.add("active");
        localStorage.setItem("nlgLang", lang);
    }

    document.getElementById("langNp").addEventListener("click", () => updateUI("np"));
    document.getElementById("langEn").addEventListener("click", () => updateUI("en"));
    updateUI(currentLang);
</script>
