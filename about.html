<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About – Nepal Law Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefefe; color: #1e1e2a; line-height: 1.55; }
        :root { --primary-blue: #0B2F66; --crimson: #9E1B32; --border-light: #e9ecef; --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
        .navbar {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0a3a6e 100%);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--crimson);
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .brand-name { font-size: 1.8rem; font-weight: 800; color: white; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; padding: 0.4rem 0.8rem; border-radius: 40px; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { background: var(--crimson); }
        .lang-toggle { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.1); padding: 0.3rem 0.8rem; border-radius: 60px; }
        .lang-btn { background: transparent; border: none; font-size: 0.9rem; font-weight: 600; padding: 0.4rem 1rem; border-radius: 40px; cursor: pointer; color: white; }
        .lang-btn.active { background: var(--crimson); }
        .page-hero { background: linear-gradient(105deg, #f0f4fe 0%, #ffffff 100%); border-bottom: 4px solid var(--crimson); padding: 2.5rem 0; text-align: center; }
        .page-hero h1 { font-size: 2.5rem; color: var(--primary-blue); }
        section { padding: 2.5rem 0; border-bottom: 1px solid var(--border-light); }
        .section-title { font-size: 1.7rem; font-weight: 800; color: var(--primary-blue); border-left: 6px solid var(--crimson); padding-left: 1.2rem; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.8rem; margin-top: 1rem; }
        .card { background: white; border-radius: 24px; padding: 1.5rem; box-shadow: var(--shadow-sm); border-left: 4px solid var(--crimson); }
        .card i { font-size: 1.8rem; color: var(--crimson); margin-bottom: 0.8rem; }
        .footer { background: #0a1a2e; color: #cddfea; text-align: center; padding: 2rem 0; border-top: 3px solid var(--crimson); margin-top: 2rem; }
        @media (max-width: 768px) { .container { padding: 0 20px; } .brand-name { font-size: 1.4rem; } }
    </style>
</head>
<body>
<header class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="brand-name" id="brandName">Nepal Law Group</a>
        <div class="nav-links">
            <a href="index.html" id="navHome">Home</a>
            <a href="about.html" id="navAbout">About</a>
            <a href="membership.html" id="navMembership">Membership</a>
            <a href="contact.html" id="navContact">Contact</a>
            <div class="lang-toggle">
                <button class="lang-btn" id="langNp">नेपाली</button>
                <button class="lang-btn" id="langEn">English</button>
            </div>
        </div>
    </div>
</header>
<main>
    <div class="page-hero">
        <div class="container"><h1 id="heroTitle">नेपाल ल ग्रुपको बारेमा</h1></div>
    </div>
    <div class="container">
        <section><h2 class="section-title" id="bgHeading">पृष्ठभूमि र आवश्यकता</h2><div id="bgText"></div><div class="grid" id="challengesGrid"></div></section>
        <section><h2 class="section-title" id="solutionHeading">समाधान: नेपाल ल ग्रुप</h2><div id="solutionText"></div><div class="grid" id="solutionGrid"></div></section>
        <section><h2 class="section-title" id="valuesHeading">हाम्रो दर्शन र मूल मान्यताहरू</h2><div class="grid" id="valuesGrid"></div></section>
        <section><h2 class="section-title" id="whyHeading">किन मुनाफा वितरण नगर्ने कम्पनी?</h2><div id="whyText"></div><div class="grid" id="reasonsGrid"></div></section>
    </div>
</main>
<footer class="footer"><div class="container"><p id="footerText">© 2025 नेपाल ल ग्रुप</p></div></footer>

<script>
    const aboutData = {
        en: {
            brand: "Nepal Law Group", navHome: "Home", navAbout: "About", navMembership: "Membership", navContact: "Contact",
            heroTitle: "About Nepal Law Group",
            bgHeading: "Background and Need",
            bgText: "The legal sector in Nepal has been based on traditional practice for decades. Before establishing Nepal Law Group, the founding members identified seven enduring challenges:",
            challenges: [
                "Solo working style – most lawyers work alone, making complex cases difficult.",
                "Limited Infrastructure – lack of technology, libraries, and trained staff.",
                "Weak institutional branding – firms dissolve when senior lawyers leave.",
                "Lack of shared growth – surplus distributed, no capital accumulation.",
                "Regulatory complexity – unclear separation of admin and legal practice.",
                "Untapped revenue sources – over-reliance on litigation fees.",
                "Succession problem – no transfer of clients and knowledge."
            ],
            solutionHeading: "Solution: Nepal Law Group",
            solutionText: "We address all challenges with an integrated institutional model:",
            solutions: [
                "Collaborative multidisciplinary team",
                "Shared infrastructure and technology",
                "Sustainable institutional brand",
                "Company-level income and reinvestment",
                "Regulatory compliance with clear separation",
                "Diversified income sources",
                "Long-term sustainability"
            ],
            valuesHeading: "Our Philosophy & Core Values",
            values: [
                { title: "Transparency", desc: "All financial and governance structures are fully transparent." },
                { title: "Cooperation", desc: "Shared learning and teamwork over individual competition." },
                { title: "Ethics & Professional Conduct", desc: "Full adherence to the Bar Council's code." },
                { title: "Continuous Improvement", desc: "Always refining services and systems." }
            ],
            whyHeading: "Why a non-profit company structure?",
            whyText: "Under Sections 166-167 of the Companies Act, 2006:",
            reasons: [
                "All surplus remains in the company – capital accumulation and reinvestment.",
                "Limited liability of members – personal risk minimized.",
                "Non-transferable membership – stability and long-term commitment.",
                "25% limit on administrative expenses – financial discipline."
            ],
            footer: "© 2025 Nepal Law Group - All rights reserved"
        },
        np: {
            brand: "नेपाल ल ग्रुप", navHome: "गृहपृष्ठ", navAbout: "बारेमा", navMembership: "सदस्यता", navContact: "सम्पर्क",
            heroTitle: "नेपाल ल ग्रुपको बारेमा",
            bgHeading: "पृष्ठभूमि र आवश्यकता",
            bgText: "नेपालको कानूनी क्षेत्र दशकौंदेखि परम्परागत अभ्यासमा आधारित छ। नेपाल ल ग्रुप स्थापना गर्नुअघि संस्थापक सदस्यहरूले सात स्थायी चुनौतीहरू पहिचान गरे:",
            challenges: [
                "एकल कार्यशैली – अधिकांश अधिवक्ता एक्लै काम गर्छन्।",
                "सीमित पूर्वाधार – प्रविधि, पुस्तकालय र तालिमको अभाव।",
                "कमजोर संस्थागत ब्रान्डिङ – वरिष्ठ अधिवक्ता गएपछि फर्म विघटन।",
                "साझा वृद्धिको अभाव – अधिशेष बाँडिन्छ, पूँजी संचय हुँदैन।",
                "नियामक जटिलता – प्रशासन र कानूनी अभ्यासबीच अस्पष्टता।",
                "अप्रयुक्त आय स्रोत – मुद्दा शुल्कमा मात्र निर्भरता।",
                "उत्तराधिकार समस्या – ग्राहक र ज्ञान हस्तान्तरणको अभाव।"
            ],
            solutionHeading: "समाधान: नेपाल ल ग्रुप",
            solutionText: "हामी सबै चुनौतीहरूको एकीकृत संस्थागत समाधान प्रस्तुत गर्दछौं:",
            solutions: [
                "सहकार्यमूलक बहु-विषयक टोली",
                "साझा पूर्वाधार र प्रविधि",
                "दिगो संस्थागत ब्रान्ड",
                "कम्पनी-स्तरको आय र पुनः लगानी",
                "नियामक अनुपालन र स्पष्ट अलगाव",
                "विविधीकृत आय स्रोत",
                "दीर्घकालीन दिगोपन"
            ],
            valuesHeading: "हाम्रो दर्शन र मूल मान्यताहरू",
            values: [
                { title: "पारदर्शिता", desc: "सबै वित्तीय र सुशासन संरचना पारदर्शी।" },
                { title: "सहकारिता", desc: "व्यक्तिगत प्रतिस्पर्धा नभई टोली कार्य।" },
                { title: "नैतिकता र व्यावसायिक आचरण", desc: "बार काउन्सिलको आचारसंहिताको पूर्ण पालना।" },
                { title: "निरन्तर सुधार", desc: "सेवा र प्रणालीलाई निरन्तर परिष्कृत।" }
            ],
            whyHeading: "किन मुनाफा वितरण नगर्ने कम्पनी?",
            whyText: "कम्पनी ऐन, २०६३ को दफा १६६–१६७ अन्तर्गत:",
            reasons: [
                "सबै अधिशेष कम्पनीमा रहन्छ – पूँजी संचय र पुनः लगानी।",
                "सदस्यको दायित्व सीमित – व्यक्तिगत जोखिम न्यून।",
                "सदस्यता हस्तान्तरण नहुने – स्थिरता र दीर्घकालीन प्रतिबद्धता।",
                "प्रशासनिक खर्चको २५% सीमा – वित्तीय अनुशासन।"
            ],
            footer: "© २०२५ नेपाल ल ग्रुप - सबै अधिकार सुरक्षित"
        }
    };

    let currentLang = localStorage.getItem("nlgLang") || "en";

    function updateLang(lang) {
        const d = aboutData[lang];
        document.getElementById("brandName").innerText = d.brand;
        document.getElementById("navHome").innerText = d.navHome;
        document.getElementById("navAbout").innerText = d.navAbout;
        document.getElementById("navMembership").innerText = d.navMembership;
        document.getElementById("navContact").innerText = d.navContact;
        document.getElementById("heroTitle").innerText = d.heroTitle;
        document.getElementById("bgHeading").innerText = d.bgHeading;
        document.getElementById("bgText").innerHTML = `<p>${d.bgText}</p>`;
        document.getElementById("solutionHeading").innerText = d.solutionHeading;
        document.getElementById("solutionText").innerHTML = `<p>${d.solutionText}</p>`;
        document.getElementById("valuesHeading").innerText = d.valuesHeading;
        document.getElementById("whyHeading").innerText = d.whyHeading;
        document.getElementById("whyText").innerHTML = `<p>${d.whyText}</p>`;
        document.getElementById("footerText").innerHTML = d.footer;

        const challengesGrid = document.getElementById("challengesGrid");
        challengesGrid.innerHTML = d.challenges.map(ch => `<div class="card"><i class="fas fa-exclamation-triangle"></i><p>${ch}</p></div>`).join("");
        const solutionGrid = document.getElementById("solutionGrid");
        solutionGrid.innerHTML = d.solutions.map(s => `<div class="card"><i class="fas fa-check-circle"></i><p>${s}</p></div>`).join("");
        const valuesGrid = document.getElementById("valuesGrid");
        valuesGrid.innerHTML = d.values.map(v => `<div class="card"><i class="fas fa-star"></i><h3>${v.title}</h3><p>${v.desc}</p></div>`).join("");
        const reasonsGrid = document.getElementById("reasonsGrid");
        reasonsGrid.innerHTML = d.reasons.map(r => `<div class="card"><i class="fas fa-chart-line"></i><p>${r}</p></div>`).join("");

        document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
        if (lang === "np") document.getElementById("langNp").classList.add("active");
        else document.getElementById("langEn").classList.add("active");
        localStorage.setItem("nlgLang", lang);
        currentLang = lang;
    }

    document.getElementById("langNp").onclick = () => updateLang("np");
    document.getElementById("langEn").onclick = () => updateLang("en");
    updateLang(currentLang);
</script>
</body>
</html>
