        { icon: "fas fa-eye", title: "पारदर्शिता", desc: "सबै आर्थिक कारोबार, निर्णय प्रक्रिया, र सुशासन संरचनाहरू पूर्ण रूपमा पारदर्शी।" },

    const enValues = [
        { icon: "fas fa-eye", title: "Transparency", desc: "All financial transactions, decision-making, and governance structures are fully transparent." },
        { icon: "fas fa-handshake", title: "Cooperation", desc: "Prioritizing shared learning and teamwork over individual competition; cooperative model to overcome solo practice limitations." },
        { icon: "fas fa-gavel", title: "Ethics and Professional Conduct", desc: "Full adherence to the Code of Ethics for Legal Professionals." },
        { icon: "fas fa-chart-line", title: "Continuous Improvement", desc: "Stagnation is the enemy of sustainability; constantly enhancing services, systems and processes." }
    ];

        <p><strong>२. सदस्यहरूको दायित्व सीमित – व्यक्तिगत जोखिम न्यूनीकरण:</strong> कम्पनीको ऋण वा दायित्वको लागि सदस्यहरू व्यक्तिगत रूपमा जिम्मेवार हुँदैनन्, जसले व्यक्तिगत वित्तीय सुरक्षा ग्यारेन्टी गर्दछ।</p>

        <p><strong>४. प्रशासनिक खर्चको २५% सीमा – वित्तीय अनुशासन र पारदर्शिता:</strong> कम्पनी ऐन, २०६३ को दफा १६७(१)(ज) अनुसार प्रशासनिक खर्च कुल खर्चको २५% भन्दा बढी नहुने, जसले अधिकांश कोष उद्देश्यमुखी गतिविधिमा खर्च हुन सुनिश्चित गर्दछ।</p>
    `;
    const enNonProfit = `
        <p><strong>1. All surplus remains in the company – capital accumulation and reinvestment:</strong> Traditional firms distribute surplus among partners. In a non-profit company, all surplus stays as company capital, enabling reinvestment in new technology, library, infrastructure and HR development.</p>
        <p><strong>2. Limited liability of members – minimization of personal risk:</strong> Members are not personally liable for the company's debts or obligations, guaranteeing personal financial security.</p>
        <p><strong>3. Non-transferability of membership – stability and long-term commitment:</strong> Membership cannot be sold or transferred; it terminates only upon death, resignation, or non-renewal for 3 years, ensuring stability.</p>
        <p><strong>4. 25% limit on administrative expenses – financial discipline and transparency:</strong> As per Companies Act 2063, administrative expenses cannot exceed 25% of total expenses, ensuring most funds are spent on programmatic activities.</p>
    `;

    // Helper to render grid
    function renderChallenges(lang) {
        const challenges = lang === 'np' ? npChallenges : enChallenges;
        const containerId = lang === 'np' ? 'challenges-grid-np' : 'challenges-grid-en';
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = challenges.map(c => `
            <div class="challenge-card">
                <div class="card-number">${c.num}</div>
                <h3>${c.title}</h3>
                <p>${c.desc}</p>
            </div>
        `).join('');
    }

    function renderSolutions(lang) {
        const solutions = lang === 'np' ? npSolutions : enSolutions;
        const containerId = lang === 'np' ? 'solutions-list-np' : 'solutions-list-en';
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `<div class="rich-content">` + solutions.map(s => `<div class="solution-item"><i class="fas fa-check-circle text-crimson" style="margin-right: 12px;"></i> ${s}</div>`).join('') + `</div>`;
    }

    function renderValues(lang) {
        const values = lang === 'np' ? npValues : enValues;
        const containerId = lang === 'np' ? 'values-list-np' : 'values-list-en';
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = values.map(v => `
            <div class="value-card">
                <div class="value-icon"><i class="${v.icon}"></i></div>
                <h3>${v.title}</h3>
                <p>${v.desc}</p>
            </div>
        `).join('');
    }

    function renderNonProfit(lang) {
        const containerId = lang === 'np' ? 'nonprofit-reasons-np' : 'nonprofit-reasons-en';
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = lang === 'np' ? npNonProfit : enNonProfit;
    }

    function setHeroAndFooter(lang) {
        const heroTitle = document.getElementById('hero-title');
        const heroSub = document.getElementById('hero-sub');
        const footerText = document.getElementById('footer-text');
        if (lang === 'np') {
            heroTitle.innerText = 'नेपाल ल ग्रुपको बारेमा';
            heroSub.innerText = 'पृष्ठभूमि, चुनौती र संस्थागत समाधान';
            footerText.innerText = '© २०२५ नेपाल ल ग्रुप - सबै अधिकार सुरक्षित | कानूनी सेवा सबैको पहुँचमा';
        } else {
            heroTitle.innerText = 'About Nepal Law Group';
            heroSub.innerText = 'Background, Challenges & Institutional Solutions';
            footerText.innerText = '© 2025 Nepal Law Group - All rights reserved | Access to justice for all';
        }
    }

    let currentLang = 'en';

    function updateLanguage(lang) {
        const mainContainer = document.getElementById('about-dynamic-content');
        if (lang === 'np') {
            mainContainer.innerHTML = npContent;
        } else {
            mainContainer.innerHTML = enContent;
        }
        // After injecting HTML, render dynamic sub-components
        renderChallenges(lang);
        renderSolutions(lang);
        renderValues(lang);
        renderNonProfit(lang);
        setHeroAndFooter(lang);
        currentLang = lang;
        // Update active button class
        document.getElementById('lang-np').classList.remove('active');
        document.getElementById('lang-en').classList.remove('active');
        if (lang === 'np') document.getElementById('lang-np').classList.add('active');
        else document.getElementById('lang-en').classList.add('active');
    }

    // Event listeners
    document.getElementById('lang-np').addEventListener('click', () => { if (currentLang !== 'np') updateLanguage('np'); });
    document.getElementById('lang-en').addEventListener('click', () => { if (currentLang !== 'en') updateLanguage('en'); });

    // Initial load (English)
    updateLanguage('en');
</script>
