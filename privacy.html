                    <li>(ख) सदस्यता आवेदनहरू प्रशोधन गर्न: योग्यता प्रमाणित गर्न, सदस्यता रेकर्डहरू कायम राख्न, र सदस्यता सञ्चार व्यवस्थापन गर्न।</li>
                    <li>(ग) वेबसाइट सुधार गर्न: प्रयोग ढाँचाहरूको विश्लेषण गर्न, प्राविधिक समस्याहरूको निदान गर्न, र प्रयोगकर्ता अनुभव बढाउन।</li>
                    <li>(घ) कानुनी दायित्वहरूको पालना गर्न: नेपालको कानून अन्तर्गत आवश्यक पर्ने सरकारी अधिकारीहरू वा अदालतहरूबाट कानुनी अनुरोधहरूको जवाफ दिनुहोस्।</li>
                    <li>(ङ) हाम्रा अधिकारहरूको रक्षा गर्न: धोखाधडी रोक्न, हाम्रो प्रयोगका सर्तहरू लागू गर्न, र वेबसाइट र यसका प्रयोगकर्ताहरूको सुरक्षा सुरक्षित गर्न।</li>
                </ul>
                <p>(२) हामी मार्केटिङ वा व्यावसायिक उद्देश्यका लागि कुनै पनि तेस्रो पक्षलाई तपाईंको व्यक्तिगत जानकारी बेच्ने, भाडामा दिने वा व्यापार गर्ने छैनौं।</p>
                
                <h2>४. प्रशोधनको लागि कानुनी आधार</h2>
                <p>कम्पनी नेपालमा आधारित भए तापनि, हामी अन्तर्राष्ट्रिय गोपनीयता मापदण्डहरूको सम्मान गर्छौं। व्यक्तिगत जानकारी प्रशोधन गर्ने हाम्रो कानुनी आधारहरूमा समावेश छन्: (क) जब तपाईं स्वेच्छाले जानकारी प्रदान गर्नुहुन्छ (जस्तै, सदस्यता आवेदन); (ख) वेबसाइट सञ्चालन र सुधार गर्न, तपाईंसँग कुराकानी गर्न, र दुरुपयोग रोक्न; (ग) नेपाली कानूनद्वारा आवश्यक पर्दा।</p>
                
                <h2>५. डेटा साझेदारी र खुलासा</h2>
                <p>(१) हामी निम्न सीमित परिस्थितिहरूमा मात्र तपाईंको व्यक्तिगत जानकारी साझा गर्न सक्छौं:</p>
                <ul>
                    <li>(क) हामीलाई वेबसाइट सञ्चालन गर्न वा सदस्यता डेटा व्यवस्थापन गर्न मद्दत गर्ने तेस्रो पक्षहरू (जस्तै, होस्टिंग प्रदायकहरू, इमेल सेवाहरू)। यी प्रदायकहरू तपाईंको डेटा सुरक्षित गर्न र निर्दिष्ट उद्देश्यहरूको लागि मात्र प्रयोग गर्न सम्झौतामा बाध्य छन्।</li>
                    <li>(ख) अदालतको आदेश, समन, वा नेपाली कानून अन्तर्गत अन्य कानुनी प्रक्रियाद्वारा आवश्यक परेमा।</li>
                    <li>(ग) भौतिक हानि वा वित्तीय क्षति रोक्न, वा शंकास्पद अवैध गतिविधि रिपोर्ट गर्न आवश्यक परेमा।</li>
                    <li>(घ) अन्य कुनै पनि अवस्थामा, हामी तपाईंको जानकारी साझा गर्नु अघि तपाईंको पूर्व लिखित सहमति प्राप्त गर्नेछौं।</li>
                </ul>
                <p>(२) कम्पनी अझै सम्म समावेश नभएको हुनाले, संस्थापक समूहका सदस्यहरूले आवेदनहरू प्रशोधन गर्ने र समावेशीकरण कागजातहरू तयार गर्ने उद्देश्यका लागि मात्र सदस्यता आवेदन डेटामा पहुँच गर्न सक्छन्। त्यस्ता सबै सदस्यहरू गोपनीयता दायित्वहरूद्वारा बाध्य छन्।</p>
                
                <h2>६. डेटा अवधारण</h2>
                <p>(१) हामी तपाईंको व्यक्तिगत जानकारी यस गोपनीयता नीतिमा उल्लिखित उद्देश्यहरू पूरा गर्न आवश्यक भएसम्म मात्र राख्छौं, जबसम्म कानूनद्वारा लामो अवधारण अवधि आवश्यक वा अनुमति दिइएको छैन।</p>
                <ul>
                    <li>(क) यदि तपाईंको सदस्यता आवेदन स्वीकृत भयो भने, तपाईंको जानकारी तपाईं सदस्य रहुन्जेल र त्यसपछि अभिलेखीय र कानुनी अनुपालनको लागि उचित अवधिको लागि राखिनेछ।</li>
                    <li>(ख) सामान्यतया अन्तिम सञ्चार पछि दुई वर्षसम्म राखिन्छ।</li>
                    <li>(ग) विश्लेषण र सुरक्षा उद्देश्यका लागि १२ महिनासम्म राखिन्छ।</li>
                </ul>
                <p>(२) समावेशीकरण पछि, कम्पनीले औपचारिक डेटा अवधारण तालिका अपनाउनेछ।</p>
                
                <h2>७. डेटा सुरक्षा</h2>
                <p>हामी तपाईंको व्यक्तिगत जानकारीलाई अनधिकृत पहुँच, प्रकटीकरण, परिवर्तन, वा विनाशबाट जोगाउन उचित प्रशासनिक, प्राविधिक र भौतिक सुरक्षा उपायहरू लागू गर्छौं। यसमा समावेश छन्: (क) वेबसाइट मार्फत प्रसारित डेटाको लागि सुरक्षित सकेट तह (SSL) इन्क्रिप्सन; (ख) अधिकृत व्यक्तिहरू (संस्थापकहरू र तोकिएका प्रशासकहरू) लाई मात्र व्यक्तिगत जानकारीमा प्रतिबन्धित पहुँच; (ग) हाम्रो डेटा सङ्कलन र भण्डारण अभ्यासहरूको नियमित समीक्षा। यद्यपि, इन्टरनेट वा इलेक्ट्रोनिक भण्डारण मार्फत प्रसारणको कुनै पनि विधि १००% सुरक्षित छैन। हामी तपाईंको जानकारी सुरक्षित गर्न प्रयासरत भए तापनि, हामी पूर्ण सुरक्षाको ग्यारेन्टी दिन सक्दैनौं।</p>
                
                <h2>८. तपाईंको अधिकार</h2>
                <p>(१) तपाईंको क्षेत्राधिकारमा निर्भर गर्दै, तपाईंको व्यक्तिगत जानकारीको सम्बन्धमा तपाईंसँग केही अधिकारहरू हुन सक्छन्: (क) हामीसँग तपाईंको बारेमा रहेको व्यक्तिगत जानकारीको प्रतिलिपि अनुरोध गर्नुहोस्; (ख) गलत वा अपूर्ण जानकारी सच्याउनुहोस्; (ग) कानुनी अवधारण दायित्वहरूको अधीनमा, तपाईंको जानकारी मेटाउने अनुरोध गर्नुहोस्; (घ) हामीले तपाईंको जानकारी कसरी प्रयोग गर्छौं भन्ने कुरा सीमित गर्नुहोस्; (ङ) तपाईंको जानकारी संरचित, मेसिन-पठनीय ढाँचामा प्राप्त गर्नुहोस्; (च) जहाँ प्रशोधन सहमतिमा आधारित हुन्छ, तपाईं यसलाई कुनै पनि समयमा फिर्ता लिन सक्नुहुन्छ।</p>
                <p>(२) यी मध्ये कुनै पनि अधिकार प्रयोग गर्न, कृपया कम्पनीलाई सम्पर्क गर्नुहोस्। हामी ३० दिन भित्र प्रतिक्रिया दिनेछौं। कृपया ध्यान दिनुहोस् कि कम्पनी अझै कानुनी संस्था नभएकोले, केही अधिकारहरू समावेश नभएसम्म सीमित हुन सक्छन्।</p>
                
                <h2>९. तेस्रो-पक्ष लिङ्कहरू</h2>
                <p>वेबसाइटमा बाह्य वेबसाइटहरूको लिङ्कहरू हुन सक्छन् (जस्तै, बार संघहरू, सरकारी पोर्टलहरू, कानुनी स्रोतहरू)। हामी त्यस्ता तेस्रो-पक्ष साइटहरूको गोपनीयता अभ्यासहरू वा सामग्रीको लागि जिम्मेवार छैनौं। हामी तपाईंलाई कुनै पनि व्यक्तिगत जानकारी प्रदान गर्नु अघि उनीहरूको गोपनीयता नीतिहरू पढ्न प्रोत्साहित गर्दछौं।</p>
                
                <h2>१०. बालबालिकाको गोपनीयता</h2>
                <p>वेबसाइट १८ वर्ष मुनिका व्यक्तिहरूको लागि लक्षित छैन। हामी जानाजानी नाबालिगहरूबाट व्यक्तिगत जानकारी सङ्कलन गर्दैनौं। यदि हामीलाई थाहा भयो कि १८ वर्ष मुनिको व्यक्तिले हामीलाई व्यक्तिगत जानकारी प्रदान गरेको छ भने, हामी यसलाई तुरुन्तै मेटाउनेछौं। यदि तपाईंलाई विश्वास छ कि कुनै नाबालिगले डेटा पेश गरेको छ भने, कृपया हामीलाई सम्पर्क गर्नुहोस्।</p>
                
                <h2>११. अन्तर्राष्ट्रिय डेटा स्थानान्तरण</h2>
                <p>वेबसाइट नेपालबाट सञ्चालित छ। यदि तपाईं नेपाल बाहिरबाट वेबसाइट पहुँच गर्नुहुन्छ भने, कृपया सचेत रहनुहोस् कि तपाईंको जानकारी नेपालमा स्थानान्तरण, भण्डारण र प्रशोधन गर्न सकिन्छ, जहाँ डेटा सुरक्षा कानूनहरू तपाईंको क्षेत्राधिकारमा रहेका कानूनहरू भन्दा फरक हुन सक्छन्। वेबसाइट प्रयोग गरेर, तपाईं यस्तो स्थानान्तरणमा सहमत हुनुहुन्छ।</p>
                
                <h2>१२. यस गोपनीयता नीतिमा परिवर्तनहरू</h2>
                <p>हामी हाम्रा अभ्यासहरू, कानुनी आवश्यकताहरू, वा सञ्चालन आवश्यकताहरूमा परिवर्तनहरू प्रतिबिम्बित गर्न समय-समयमा यो गोपनीयता नीति अद्यावधिक गर्न सक्छौं। कुनै पनि सामग्री परिवर्तनहरू अद्यावधिक प्रभावकारी मितिको साथ यस पृष्ठमा पोस्ट गरिनेछ। हामी तपाईंलाई आवधिक रूपमा यो नीति समीक्षा गर्न प्रोत्साहित गर्दछौं। कुनै पनि परिवर्तन पछि वेबसाइटको तपाईंको निरन्तर प्रयोगले संशोधित नीतिको तपाईंको स्वीकृतिलाई जनाउँछ।</p>
                
                <h2>१३. सम्पर्क जानकारी</h2>
                <p>यस गोपनीयता नीति वा तपाईंको व्यक्तिगत जानकारी सम्बन्धी कुनै पनि प्रश्न, सरोकार वा अनुरोधहरूको लागि, कृपया कम्पनीलाई सम्पर्क गर्नुहोस्। कम्पनी अझै सम्म समावेश नभएको हुनाले, सोधपुछ संस्थापक समूहद्वारा ह्यान्डल गरिनेछ। स्थापना पछि, कम्पनीले एक तोकिएको गोपनीयता अधिकारी नियुक्त गर्नेछ।</p>
                
                <h2>१४. शासित कानून</h2>
                <p>(१) यो गोपनीयता नीति र यस अन्तर्गत उत्पन्न हुने कुनै पनि विवादहरू नेपालको कानूनद्वारा शासित हुनेछन्। यस नीतिसँग सम्बन्धित कुनै पनि कानुनी कारबाही हाम्रो प्रयोगका सर्तहरूमा तोकिएका सीमाहरूको अधीनमा रहेर काठमाडौँ जिल्ला, नेपाल (वा, स्थापना पछि, कम्पनीको दर्ता गरिएको कार्यालय रहेको जिल्ला) को अदालतहरूमा ल्याइनेछ।</p>
                <p>(२) यो वेबसाइट प्रयोग गरेर, तपाईंले स्वीकार गर्नुहुन्छ कि तपाईंले यो गोपनीयता नीति पढ्नुभएको छ, बुझ्नुभएको छ र सहमत हुनुहुन्छ।</p>
                <p><em>इति सम्वत् २०८३ साल वैशाख महिना ४ गते रोज ६ शुभम् .............................................. ।</em></p>
            `,
            footerText: "© २०२५ नेपाल ल ग्रुप – सबै अधिकार सुरक्षित",
            termsText: "प्रयोगका सर्तहरू", privacyText: "गोपनीयता नीति", cookieText: "कुकी नीति"
        }
    };

    let currentLang = localStorage.getItem("nlgLang") || "en";

    function updateUI(lang) {
        const d = content[lang];
        document.getElementById("brandName").innerText = d.brand;
        document.getElementById("navHome").innerText = d.navHome;
        document.getElementById("navAbout").innerText = d.navAbout;
        document.getElementById("navMembership").innerText = d.navMembership;
        document.getElementById("navContact").innerText = d.navContact;
        document.getElementById("pageTitle").innerText = d.pageTitle;
        document.getElementById("privacyContent").innerHTML = d.htmlContent;
        document.getElementById("footerText").innerText = d.footerText;
        document.getElementById("termsLink").innerText = d.termsText;
        document.getElementById("privacyLink").innerText = d.privacyText;
        document.getElementById("cookieLink").innerText = d.cookieText;

        document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
        if (lang === "np") document.getElementById("langNp").classList.add("active");
        else document.getElementById("langEn").classList.add("active");
        localStorage.setItem("nlgLang", lang);
    }

    document.getElementById("langNp").addEventListener("click", () => updateUI("np"));
    document.getElementById("langEn").addEventListener("click", () => updateUI("en"));
    updateUI(currentLang);
</script>
</body>
</html>
