<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy – Nepal Law Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefefe; color: #1e1e2a; line-height: 1.55; }
        :root { --primary-blue: #0B2F66; --crimson: #9E1B32; --border-light: #e9ecef; --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
        .navbar {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0a3a6e 100%);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--crimson);
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .brand-name { font-size: 1.8rem; font-weight: 800; color: white; text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; padding: 0.4rem 0.8rem; border-radius: 40px; transition: 0.2s; }
        .nav-links a:hover { background: var(--crimson); }
        .lang-toggle { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.1); padding: 0.3rem 0.8rem; border-radius: 60px; }
        .lang-btn { background: transparent; border: none; font-size: 0.9rem; font-weight: 600; padding: 0.4rem 1rem; border-radius: 40px; cursor: pointer; color: white; }
        .lang-btn.active { background: var(--crimson); }
        .page-hero { background: linear-gradient(105deg, #f0f4fe 0%, #ffffff 100%); border-bottom: 4px solid var(--crimson); padding: 2rem 0; text-align: center; }
        .page-hero h1 { font-size: 2rem; color: var(--primary-blue); }
        .content-policy { background: white; border-radius: 28px; padding: 2rem; margin: 2rem 0; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); }
        .content-policy h2 { color: var(--primary-blue); margin: 1.5rem 0 0.5rem; font-size: 1.4rem; border-left: 4px solid var(--crimson); padding-left: 1rem; }
        .content-policy p, .content-policy ul { margin-bottom: 1rem; }
        .content-policy ul { padding-left: 2rem; }
        .footer { background: #0a1a2e; color: #cddfea; text-align: center; padding: 1.5rem 0; border-top: 3px solid var(--crimson); margin-top: 2rem; }
        @media (max-width: 768px) { .container { padding: 0 20px; } .brand-name { font-size: 1.4rem; } }
    </style>
</head>
<body>
<header class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="brand-name">Nepal Law Group</a>
        <div class="nav-links">
            <a href="index.html" id="navHome">Home</a>
            <a href="about.html" id="navAbout">About</a>
            <a href="membership.html" id="navMembership">Membership</a>
            <a href="contact.html" id="navContact">Contact</a>
            <div class="lang-toggle">
                <button class="lang-btn" id="langNp">नेपाली</button>
                <button class="lang-btn" id="langEn">English</button>
            </div>
        </div>
    </div>
</header>
<main>
    <div class="page-hero">
        <div class="container"><h1 id="heroTitle">Privacy Policy</h1></div>
    </div>
    <div class="container">
        <div class="content-policy" id="policyContent"></div>
    </div>
</main>
<footer class="footer">
    <div class="container"><p>© 2025 Nepal Law Group - All rights reserved</p></div>
</footer>
<script>
    const privacyData = {
        en: {
            heroTitle: "Privacy Policy",
            content: `
                <p><strong>Effective date: April 2025</strong></p>
                <p>Nepal Law Group ("we", "us", "our") respects your privacy. This Privacy Policy explains how we collect, use, and protect your personal information when you visit our website.</p>
                <h2>1. Information We Collect</h2>
                <p>We may collect personal information that you voluntarily provide to us, such as your name, email address, phone number, and any message you submit through our contact form. We also collect non-personal information such as browser type, IP address, and pages visited.</p>
                <h2>2. How We Use Your Information</h2>
                <p>We use your information to respond to inquiries, improve our website, and communicate with you about our services. We do not sell, trade, or rent your personal information to third parties.</p>
                <h2>3. Cookies</h2>
                <p>Our website uses cookies to enhance user experience. You can control cookie preferences through your browser settings. For more details, see our <a href="cookie.html">Cookie Policy</a>.</p>
                <h2>4. Data Security</h2>
                <p>We implement reasonable security measures to protect your information. However, no method of transmission over the internet is 100% secure.</p>
                <h2>5. Third-Party Links</h2>
                <p>Our website may contain links to external sites. We are not responsible for the privacy practices of those sites.</p>
                <h2>6. Children's Privacy</h2>
                <p>Our website is not intended for children under 13. We do not knowingly collect personal information from children.</p>
                <h2>7. Your Rights</h2>
                <p>You may request access to, correction of, or deletion of your personal information by contacting us at <a href="mailto:info@nepallawgroup.org">info@nepallawgroup.org</a>.</p>
                <h2>8. Changes to This Policy</h2>
                <p>We may update this Privacy Policy from time to time. The revised version will be posted on this page with an updated effective date.</p>
                <h2>9. Contact Us</h2>
                <p>If you have questions about this Privacy Policy, please email us at <a href="mailto:info@nepallawgroup.org">info@nepallawgroup.org</a>.</p>
            `
        },
        np: {
            heroTitle: "गोपनीयता नीति",
            content: `
                <p><strong>प्रभावकारी मिति: अप्रिल २०२५</strong></p>
                <p>नेपाल ल ग्रुप तपाईंको गोपनीयताको सम्मान गर्दछ। यो गोपनीयता नीतिले हाम्रो वेबसाइट भ्रमण गर्दा हामी कसरी तपाईंको व्यक्तिगत जानकारी सङ्कलन, प्रयोग र सुरक्षा गर्छौं भनी व्याख्या गर्दछ।</p>
                <h2>१. हामी के जानकारी सङ्कलन गर्छौं</h2>
                <p>हामीले तपाईंले स्वेच्छिक रूपमा उपलब्ध गराउनुभएको नाम, इमेल ठेगाना, फोन नम्बर, र सम्पर्क फारममा पठाउनुभएको सन्देश सङ्कलन गर्न सक्छौं। ब्राउजर प्रकार, आइपी ठेगाना, र भ्रमण गरिएका पृष्ठहरू जस्ता गैर-व्यक्तिगत जानकारी पनि सङ्कलन गर्छौं।</p>
                <h2>२. हामी तपाईंको जानकारी कसरी प्रयोग गर्छौं</h2>
                <p>हामी तपाईंको जानकारी सोधपुछको जवाफ दिन, हाम्रो वेबसाइट सुधार गर्न, र हाम्रो सेवाको बारेमा तपाईंलाई जानकारी दिन प्रयोग गर्छौं। हामी तपाईंको व्यक्तिगत जानकारी तेस्रो पक्षलाई बेच्दैनौं, व्यापार गर्दैनौं, वा भाडामा दिँदैनौं।</p>
                <h2>३. कुकीहरू</h2>
                <p>हाम्रो वेबसाइटले प्रयोगकर्ता अनुभव बढाउन कुकीहरू प्रयोग गर्दछ। तपाईंले आफ्नो ब्राउजर सेटिङमार्फत कुकी प्राथमिकताहरू नियन्त्रण गर्न सक्नुहुन्छ। थप विवरणको लागि हाम्रो <a href="cookie.html">कुकी नीति</a> हेर्नुहोस्।</p>
                <h2>४. डाटा सुरक्षा</h2>
                <p>हामी तपाईंको जानकारी सुरक्षित राख्न उचित सुरक्षा उपायहरू लागू गर्छौं। तथापि, इन्टरनेटमा कुनै पनि प्रसारण विधि १००% सुरक्षित हुँदैन।</p>
                <h2>५. तेस्रो-पक्ष लिङ्कहरू</h2>
                <p>हाम्रो वेबसाइटमा बाह्य साइटहरूको लिङ्क हुन सक्छ। ती साइटहरूको गोपनीयता अभ्यासहरूको लागि हामी जिम्मेवार छैनौं।</p>
                <h2>६. बालबालिकाको गोपनीयता</h2>
                <p>हाम्रो वेबसाइट १३ वर्ष मुनिका बालबालिकाका लागि होइन। हामी जानाजानी बालबालिकाबाट व्यक्तिगत जानकारी सङ्कलन गर्दैनौं।</p>
                <h2>७. तपाईंको अधिकारहरू</h2>
                <p>तपाईंले <a href="mailto:info@nepallawgroup.org">info@nepallawgroup.org</a> मा सम्पर्क गरी आफ्नो व्यक्तिगत जानकारीको पहुँच, सच्याउन वा मेटाउन अनुरोध गर्न सक्नुहुन्छ।</p>
                <h2>८. यस नीतिमा परिवर्तन</h2>
                <p>हामी समय-समयमा यो गोपनीयता नीति अद्यावधिक गर्न सक्छौं। संशोधित संस्करण यस पृष्ठमा अद्यावधिक मिति सहित पोस्ट गरिनेछ।</p>
                <h2>९. सम्पर्क गर्नुहोस्</h2>
                <p>यस गोपनीयता नीतिबारे प्रश्न भए, कृपया हामीलाई <a href="mailto:info@nepallawgroup.org">info@nepallawgroup.org</a> मा इमेल गर्नुहोस्।</p>
            `
        }
    };
    let currentLang = localStorage.getItem("nlgLang") || "en";
    function updateUI(lang) {
        const d = privacyData[lang];
        document.getElementById("heroTitle").innerText = d.heroTitle;
        document.getElementById("policyContent").innerHTML = d.content;
        document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
        if (lang === "np") document.getElementById("langNp").classList.add("active");
        else document.getElementById("langEn").classList.add("active");
        localStorage.setItem("nlgLang", lang);
    }
    document.getElementById("langNp").onclick = () => updateUI("np");
    document.getElementById("langEn").onclick = () => updateUI("en");
    updateUI(currentLang);
</script>
</body>
</html>
